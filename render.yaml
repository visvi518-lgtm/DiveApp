databases:
  - name: diveapp-db
    plan: free
    databaseName: diveapp
    user: diveapp

services:
  - type: web
    name: diveapp-backend
    runtime: python
    plan: free
    rootDir: Backend
    buildCommand: pip install -r requirements.txt
    # preDeployCommand isn't available on the free plan, so run the migration
    # as part of startCommand instead (alembic upgrade head is idempotent —
    # safe to run on every restart).
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.7
      - key: DATABASE_URL
        fromDatabase:
          name: diveapp-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "30"
      - key: ENVIRONMENT
        value: production
      # Set after the Web static site's URL is known (chicken-and-egg on first deploy).
      - key: CORS_ALLOW_ORIGINS
        sync: false
      - key: NAVER_CLIENT_ID
        sync: false
      - key: NAVER_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false

  - type: web
    name: diveapp-web
    runtime: static
    rootDir: Web
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      # Set after the Backend service's URL is known (chicken-and-egg on first deploy).
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
      - key: VITE_NAVER_CLIENT_ID
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
