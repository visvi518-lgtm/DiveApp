name: DiveApp
options:
  bundleIdPrefix: com.diveapp
  deploymentTarget:
    iOS: "17.0"
configs:
  Debug: debug
  Release: release
targets:
  DiveApp:
    type: application
    platform: iOS
    sources:
      - path: DiveApp
    resources:
      - path: DiveApp/Resources/Assets.xcassets
    info:
      path: Generated/Info.plist
      properties:
        CFBundleDisplayName: DiveApp
        UILaunchScreen: {}
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
    settings:
      base:
        SWIFT_VERSION: "5.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.diveapp.ios
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    schemes:
      DiveApp:
        build:
          targets:
            DiveApp: all
        run:
          config: Debug
        test:
          config: Debug
